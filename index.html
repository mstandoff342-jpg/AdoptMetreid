<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adopt Me | Liza6666</title>
    <style>
        /* ========== ОБЩИЕ СТИЛИ ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            background-color: #684a77;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        /* ========== КАРТОЧКА ПРОФИЛЯ ========== */
        .profile-card {
            background: rgba(255, 230, 240, 0.25);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(255, 150, 180, 0.2);
            margin-bottom: 10px; /* Уменьшил отступ */
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 25px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        /* ===== АВАТАРКА С ФОТО ===== */
        .avatar-circle {
            width: 100px;
            height: 100px;
            border: 3px solid white;
            border-radius: 50%;
            box-shadow: 0 0 20px #ff69b4, 0 0 40px #ffb6c1;
            overflow: hidden;
        }

        .avatar-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .info-stats-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }

        .user-info h1 {
            font-size: 38px;
            color: white;
            text-shadow: 2px 2px 0 #ff8aae;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .user-info h2 {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        .stats-row {
            display: flex;
            gap: 25px;
            background: rgba(255, 255, 255, 0.15);
            padding: 12px 25px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(5px);
        }

        .stat-item {
            text-align: center;
            min-width: 70px;
        }

        .stat-value {
            font-size: 22px;
            font-weight: 700;
            color: white;
            text-shadow: 1px 1px 0 #ff8aae;
            line-height: 1.2;
        }

        .stat-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.9);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .divider {
            height: 2px;
            background: rgba(255, 255, 255, 0.3);
            margin: 15px 0; /* Уменьшил отступ */
            width: 100%;
        }

        .content-area {
            min-height: 200px;
            margin-top: 15px;
        }

        /* ========== ПРИВЕТСТВИЕ (ПОД ПРОФИЛЕМ) ========== */
        .greeting-block {
            margin: 5px 0 15px; /* Минимальный отступ сверху */
            padding-left: 10px;
            border-left: 3px solid rgba(255, 255, 255, 0.3);
        }

        .greeting-text {
            font-size: 24px;
            font-weight: 500;
            color: white;
            text-shadow: 0 0 8px #ff69b4;
            line-height: 1.5;
        }

        .greeting-text .highlight {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 15px #ff1493;
            margin: 3px 0;
        }

        .greeting-text .small {
            font-size: 18px;
            margin-top: 5px;
            opacity: 0.9;
        }

        /* ========== ОВАЛ С ТЕКСТОМ ========== */
        .oval-box {
            background: transparent;
            border: 2px solid white;
            border-radius: 60px;
            padding: 20px 30px;
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.5);
            margin: 15px 0;
        }

        .oval-text {
            font-size: 26px;
            font-weight: 600;
            color: white;
            text-shadow: 0 0 10px #ff69b4, 0 0 20px #ff69b4;
            line-height: 1.4;
            text-align: center;
        }

        .oval-text .small {
            font-size: 20px;
            display: block;
            margin-top: 8px;
            text-shadow: 0 0 8px #ff69b4;
        }

        /* ========== RGB КВАДРАТЫ ========== */
        .rgb-square {
            width: 500px;
            height: 500px;
            border: 4px solid white;
            border-radius: 30px;
            background: transparent;
            box-shadow: 
                0 0 20px #ff0000,
                0 0 40px #00ff00,
                0 0 60px #0000ff,
                0 0 80px #ff00ff;
            animation: rgbGlow 4s infinite alternate;
            margin: 15px auto;
        }

        @keyframes rgbGlow {
            0% { box-shadow: 0 0 20px #ff0000, 0 0 40px #00ff00, 0 0 60px #0000ff; }
            25% { box-shadow: 0 0 20px #ff00ff, 0 0 40px #00ffff, 0 0 60px #ffff00; }
            50% { box-shadow: 0 0 20px #00ffff, 0 0 40px #ff00ff, 0 0 60px #ff0000; }
            75% { box-shadow: 0 0 20px #ffff00, 0 0 40px #ff0000, 0 0 60px #00ff00; }
            100% { box-shadow: 0 0 20px #0000ff, 0 0 40px #ff00ff, 0 0 60px #00ffff; }
        }

        /* ========== АДАПТАЦИЯ ========== */
        @media (max-width: 600px) {
            .profile-header {
                flex-direction: column;
                text-align: center;
            }
            .info-stats-wrapper {
                flex-direction: column;
                align-items: center;
            }
            .stats-row {
                width: 100%;
                justify-content: space-around;
            }
            .avatar-circle {
                width: 80px;
                height: 80px;
            }
            .user-info h1 {
                font-size: 32px;
            }
            .greeting-text {
                font-size: 20px;
            }
            .greeting-text .highlight {
                font-size: 24px;
            }
            .oval-text {
                font-size: 22px;
            }
            .rgb-square {
                width: 400px;
                height: 400px;
            }
        }

        @media (max-width: 450px) {
            .rgb-square {
                width: 300px;
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ========== КАРТОЧКА ПРОФИЛЯ ========== -->
        <div class="profile-card">
            <div class="profile-header">
                <div class="avatar-circle">
                    <img src="avatar.jpg" alt="Liza6666">
                </div>
                <div class="info-stats-wrapper">
                    <div class="user-info">
                        <h1>Liza6666</h1>
                        <h2>Pro Trader • Looking for trades</h2>
                    </div>
                    <div class="stats-row">
                        <div class="stat-item">
                            <div class="stat-value">2.5K</div>
                            <div class="stat-label">FOLLOW</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">168</div>
                            <div class="stat-label">ОБМЕНОВ</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- ========== ПРИВЕТСТВИЕ (ПРЯМО ПОД АВАТАРКОЙ) ========== -->
            <div class="greeting-block">
                <div class="greeting-text">
                    Привет!<br>
                    это мой трейд аккаунт в<br>
                    <span class="highlight">Adopt Me!</span><br>
                    <span class="small">Добавляйся в друзья для обмена</span>
                </div>
            </div>

            <div class="divider"></div>
            <div class="content-area">
                <!-- Сюда питомцев -->
            </div>
        </div>

        <!-- ========== ОВАЛ С ТЕКСТОМ ========== -->
        <div class="oval-box">
            <div class="oval-text">
                Вот какие трейды<br>
                я могу тебе<br>
                предложить
                <span class="small">🎁 выбирай 🎁</span>
            </div>
        </div>

        <!-- ========== ЧЕТЫРЕ RGB КВАДРАТА ========== -->
        <div class="rgb-square"></div>
        <div class="rgb-square"></div>
        <div class="rgb-square"></div>
        <div class="rgb-square"></div>
    </div>
</body>
</html>
