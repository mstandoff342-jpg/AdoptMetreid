<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adopt Me | Liza6666</title>
    <style>
        /* ========== ОБЩИЕ СТИЛИ ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            background-color: #684a77;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        /* ========== КАРТОЧКА ПРОФИЛЯ ========== */
        .profile-card {
            background: rgba(255, 230, 240, 0.25);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(255, 150, 180, 0.2);
            margin-bottom: 25px;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 25px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        /* ===== АВАТАРКА ===== */
        .avatar-circle {
            width: 100px;
            height: 100px;
            border: 3px solid white;
            border-radius: 50%;
            box-shadow: 0 0 20px #ff69b4, 0 0 40px #ffb6c1;
            overflow: hidden;
        }

        .avatar-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .info-stats-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }

        .user-info h1 {
            font-size: 38px;
            color: white;
            text-shadow: 2px 2px 0 #ff8aae;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .user-info h2 {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        .stats-row {
            display: flex;
            gap: 30px;
            background: rgba(255, 255, 255, 0.15);
            padding: 12px 25px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(5px);
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: white;
            text-shadow: 2px 2px 0 #ff8aae;
            line-height: 1.2;
        }

        .stat-label {
            font-size: 14px;
            color: white;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* ========== ПРИВЕТСТВИЕ ========== */
        .greeting-box {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            padding: 25px 30px;
            margin: 20px 0;
            backdrop-filter: blur(5px);
        }

        .greeting-text {
            font-size: 26px;
            color: white;
            text-shadow: 0 0 10px #ff69b4;
            line-height: 1.5;
            text-align: center;
        }

        .greeting-text .red {
            color: #ff4d4d;
            text-shadow: 0 0 10px #ff4d4d;
            font-weight: 600;
        }

        .greeting-text .highlight {
            font-size: 32px;
            font-weight: 700;
            color: white;
            text-shadow: 0 0 15px #ff1493;
            margin: 5px 0;
        }

        .greeting-text .small {
            font-size: 20px;
            margin-top: 10px;
            opacity: 0.95;
        }

        /* ========== ОВАЛ С ТРЕЙДАМИ ========== */
        .trades-oval {
            background: transparent;
            border: 2px solid white;
            border-radius: 60px;
            padding: 25px 35px;
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.5);
            margin: 25px 0;
        }

        .trades-text {
            font-size: 28px;
            font-weight: 600;
            color: white;
            text-shadow: 0 0 10px #ff69b4, 0 0 20px #ff69b4;
            line-height: 1.5;
            text-align: center;
        }

        .trades-text .small {
            font-size: 22px;
            display: block;
            margin-top: 10px;
            text-shadow: 0 0 8px #ff69b4;
        }

        /* ========== МЕСТО ДЛЯ ПИТОМЦЕВ ========== */
        .content-area {
            min-height: 200px;
            margin: 20px 0;
        }

        /* ========== АДАПТАЦИЯ ========== */
        @media (max-width: 600px) {
            .profile-header {
                flex-direction: column;
                text-align: center;
            }
            .info-stats-wrapper {
                flex-direction: column;
                align-items: center;
            }
            .stats-row {
                width: 100%;
                justify-content: space-around;
            }
            .avatar-circle {
                width: 80px;
                height: 80px;
            }
            .user-info h1 {
                font-size: 32px;
            }
            .greeting-text {
                font-size: 22px;
            }
            .greeting-text .highlight {
                font-size: 28px;
            }
            .trades-text {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ========== КАРТОЧКА ПРОФИЛЯ ========== -->
        <div class="profile-card">
            <div class="profile-header">
                <!-- АВАТАРКА -->
                <div class="avatar-circle">
                    <img src="avatar.jpg" alt="Liza6666">
                </div>
                <div class="info-stats-wrapper">
                    <div class="user-info">
                        <h1>Liza6666</h1>
                        <h2>Pro Trader • Looking for trades</h2>
                    </div>
                    <div class="stats-row">
                        <div class="stat-item">
                            <div class="stat-value">2.5K</div>
                            <div class="stat-label">FOLLOW</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">168</div>
                            <div class="stat-label">ОБМЕНОВ</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ========== ПРИВЕТСТВИЕ (ВНУТРИ КАРТОЧКИ) ========== -->
            <div class="greeting-box">
                <div class="greeting-text">
                    <span class="red">🔴 Привет! 🔴</span><br>
                    это мой трейд аккаунт в<br>
                    <span class="highlight">Adopt Me!</span><br>
                    <span class="small">Добавляйся в друзья для обмена 🎁</span>
                </div>
            </div>

            <!-- ========== МЕСТО ДЛЯ ТВОИХ ПИТОМЦЕВ ========== -->
            <div class="content-area">
                <!-- СЮДА БУДЕШЬ ДОБАВЛЯТЬ КАРТОЧКИ ПИТОМЦЕВ -->
            </div>
        </div>

        <!-- ========== ОВАЛ С ТЕКСТОМ ========== -->
        <div class="trades-oval">
            <div class="trades-text">
                Вот какие трейды<br>
                я могу тебе<br>
                предложить<br>
                <span class="small">🎁 выбирай 🎁</span>
            </div>
        </div>
    </div>
</body>
</html>
