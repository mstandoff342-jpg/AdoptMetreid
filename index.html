<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adopt Me | Liza6666</title>
    <style>
        /* ========== ОБЩИЕ СТИЛИ ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            background-color: #684a77;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        /* ========== КАРТОЧКА ПРОФИЛЯ ========== */
        .profile-card {
            background: rgba(255, 230, 240, 0.25);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(255, 150, 180, 0.2);
            margin-bottom: 25px;
            width: 100%;
            text-align: center;
        }

        /* ===== АВАТАРКА ===== */
        .avatar-circle {
            width: 120px;
            height: 120px;
            border: 3px solid white;
            border-radius: 50%;
            box-shadow: 0 0 20px #ff69b4, 0 0 40px #ffb6c1;
            overflow: hidden;
            margin: 0 auto 20px auto;
        }

        .avatar-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* ===== ИНФОРМАЦИЯ ===== */
        .user-info {
            margin-bottom: 25px;
        }

        .user-info h1 {
            font-size: 42px;
            color: white;
            text-shadow: 2px 2px 0 #ff8aae;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .user-info h2 {
            font-size: 20px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        /* ===== СТАТИСТИКА ===== */
        .stats-container {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin: 30px 0;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: white;
            text-shadow: 2px 2px 0 #ff8aae;
            line-height: 1.2;
        }

        .stat-label {
            font-size: 16px;
            color: white;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* ========== ПРИВЕТСТВИЕ ========== */
        .greeting-block {
            margin: 30px 0;
            padding: 0 10px;
        }

        .greeting-text {
            font-size: 24px;
            color: white;
            text-shadow: 0 0 8px #ff69b4;
            line-height: 1.6;
            text-align: center;
        }

        .greeting-text .red {
            color: #ff4d4d;
            text-shadow: 0 0 10px #ff4d4d;
            font-weight: 600;
            font-size: 28px;
        }

        .greeting-text .highlight {
            font-size: 32px;
            font-weight: 700;
            color: white;
            text-shadow: 0 0 15px #ff1493;
            margin: 5px 0;
        }

        .greeting-text .small {
            font-size: 20px;
            margin-top: 10px;
            opacity: 0.95;
        }

        /* ========== РАЗДЕЛИТЕЛЬ ========== */
        .divider {
            width: 80%;
            height: 2px;
            background: rgba(255, 255, 255, 0.3);
            margin: 30px auto;
        }

        /* ========== ОВАЛ С ТРЕЙДАМИ ========== */
        .trades-oval {
            background: transparent;
            border: 2px solid white;
            border-radius: 60px;
            padding: 25px 30px;
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.5);
            margin: 30px 0;
            width: 100%;
        }

        .trades-text {
            font-size: 28px;
            font-weight: 600;
            color: white;
            text-shadow: 0 0 10px #ff69b4, 0 0 20px #ff69b4;
            line-height: 1.5;
            text-align: center;
        }

        .trades-text .small {
            font-size: 24px;
            display: block;
            margin-top: 10px;
            text-shadow: 0 0 8px #ff69b4;
        }

        /* ========== КОНТЕЙНЕР ДЛЯ КВАДРАТОВ ========== */
        .squares-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            margin: 30px 0;
            width: 100%;
        }

        /* ========== RGB КВАДРАТЫ ========== */
        .rgb-square {
            width: 500px;
            height: 500px;
            border: 4px solid white;
            border-radius: 30px;
            background: transparent;
            box-shadow: 
                0 0 20px #ff0000,
                0 0 40px #00ff00,
                0 0 60px #0000ff,
                0 0 80px #ff00ff;
            animation: rgbGlow 4s infinite alternate;
        }

        @keyframes rgbGlow {
            0% { box-shadow: 0 0 20px #ff0000, 0 0 40px #00ff00, 0 0 60px #0000ff; }
            25% { box-shadow: 0 0 20px #ff00ff, 0 0 40px #00ffff, 0 0 60px #ffff00; }
            50% { box-shadow: 0 0 20px #00ffff, 0 0 40px #ff00ff, 0 0 60px #ff0000; }
            75% { box-shadow: 0 0 20px #ffff00, 0 0 40px #ff0000, 0 0 60px #00ff00; }
            100% { box-shadow: 0 0 20px #0000ff, 0 0 40px #ff00ff, 0 0 60px #00ffff; }
        }

        /* ========== МЕСТО ДЛЯ ПИТОМЦЕВ ========== */
        .content-area {
            min-height: 200px;
            margin: 20px 0;
            width: 100%;
        }

        /* ========== АДАПТАЦИЯ ========== */
        @media (max-width: 600px) {
            .container {
                max-width: 100%;
            }
            
            .avatar-circle {
                width: 100px;
                height: 100px;
            }
            
            .user-info h1 {
                font-size: 36px;
            }
            
            .user-info h2 {
                font-size: 18px;
            }
            
            .stat-value {
                font-size: 28px;
            }
            
            .stat-label {
                font-size: 14px;
            }
            
            .greeting-text {
                font-size: 20px;
            }
            
            .greeting-text .red {
                font-size: 24px;
            }
            
            .greeting-text .highlight {
                font-size: 28px;
            }
            
            .trades-text {
                font-size: 24px;
            }
            
            .rgb-square {
                width: 400px;
                height: 400px;
            }
        }

        @media (max-width: 450px) {
            .stats-container {
                gap: 30px;
            }
            
            .rgb-square {
                width: 300px;
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ========== КАРТОЧКА ПРОФИЛЯ ========== -->
        <div class="profile-card">
            <!-- АВАТАРКА -->
            <div class="avatar-circle">
                <img src="avatar.jpg" alt="Liza6666">
            </div>

            <!-- ИМЯ И СТАТУС -->
            <div class="user-info">
                <h1>Liza6666</h1>
                <h2>Pro Trader • Looking for trades</h2>
            </div>

            <!-- СТАТИСТИКА В СТОЛБИК (как на фото) -->
            <div class="stats-container">
                <div class="stat-item">
                    <div class="stat-value">2.5K</div>
                    <div class="stat-label">FOLLOW</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">168</div>
                    <div class="stat-label">ОБМЕНОВ</div>
                </div>
            </div>

            <!-- ПРИВЕТСТВИЕ -->
            <div class="greeting-block">
                <div class="greeting-text">
                    <span class="red">🔴 Привет! 🔴</span><br>
                    это мой трейд аккаунт в<br>
                    <span class="highlight">Adopt Me!</span><br>
                    <span class="small">Добавляйся в друзья для обмена 🎁</span>
                </div>
            </div>
        </div>

        <!-- РАЗДЕЛИТЕЛЬ (как на фото) -->
        <div class="divider"></div>

        <!-- ОВАЛ С ТРЕЙДАМИ -->
        <div class="trades-oval">
            <div class="trades-text">
                Вот какие трейды<br>
                я могу тебе<br>
                предложить<br>
                <span class="small">🎁 выбирай 🎁</span>
            </div>
        </div>

        <!-- КОНТЕЙНЕР С КВАДРАТАМИ -->
        <div class="squares-container">
            <div class="rgb-square"></div>
            <div class="rgb-square"></div>
            <div class="rgb-square"></div>
            <div class="rgb-square"></div>
        </div>
    </div>
</body>
</html>
