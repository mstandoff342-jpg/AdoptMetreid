<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adopt Me | Liza6666</title>
    <style>
        /* ========== ОБЩИЕ СТИЛИ ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            background-color: #684a77;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        /* ========== КАРТОЧКА ПРОФИЛЯ ========== */
        .profile-card {
            background: rgba(255, 230, 240, 0.25);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(255, 150, 180, 0.2);
            margin-bottom: 25px;
            width: 100%;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 25px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        /* ===== АВАТАРКА ===== */
        .avatar-circle {
            width: 100px;
            height: 100px;
            border: 3px solid white;
            border-radius: 50%;
            box-shadow: 0 0 20px #ff69b4, 0 0 40px #ffb6c1;
            overflow: hidden;
            flex-shrink: 0;
        }

        .avatar-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .info-stats-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }

        .user-info h1 {
            font-size: 38px;
            color: white;
            text-shadow: 2px 2px 0 #ff8aae;
            font-weight: 700;
            margin-bottom: 5px;
            white-space: nowrap;
        }

        .user-info h2 {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 400;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .stats-row {
            display: flex;
            gap: 25px;
            background: rgba(255, 255, 255, 0.15);
            padding: 12px 25px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(5px);
            flex-shrink: 0;
        }

        .stat-item {
            text-align: center;
            min-width: 70px;
        }

        .stat-value {
            font-size: 22px;
            font-weight: 700;
            color: white;
            text-shadow: 1px 1px 0 #ff8aae;
            line-height: 1.2;
        }

        .stat-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.9);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ========== ПРИВЕТСТВИЕ ========== */
        .greeting-box {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            padding: 20px 25px;
            margin: 20px 0;
            backdrop-filter: blur(5px);
            width: 100%;
        }

        .greeting-text {
            font-size: 24px;
            color: white;
            text-shadow: 0 0 8px #ff69b4;
            line-height: 1.5;
            text-align: center;
        }

        .greeting-text .red {
            color: #ff4d4d;
            text-shadow: 0 0 10px #ff4d4d;
            font-weight: 600;
        }

        .greeting-text .highlight {
            font-size: 28px;
            font-weight: 700;
            color: white;
            text-shadow: 0 0 15px #ff1493;
            margin: 3px 0;
        }

        .greeting-text .small {
            font-size: 18px;
            margin-top: 8px;
            opacity: 0.95;
        }

        /* ========== РАЗДЕЛИТЕЛЬ ========== */
        .divider {
            height: 2px;
            background: rgba(255, 255, 255, 0.3);
            margin: 20px 0;
            width: 100%;
        }

        /* ========== МЕСТО ДЛЯ ПИТОМЦЕВ ========== */
        .content-area {
            min-height: 200px;
            margin: 15px 0;
            width: 100%;
        }

        /* ========== ОВАЛ С ТРЕЙДАМИ ========== */
        .oval-box {
            background: transparent;
            border: 2px solid white;
            border-radius: 60px;
            padding: 20px 30px;
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.5);
            margin: 25px 0;
            width: 100%;
        }

        .oval-text {
            font-size: 26px;
            font-weight: 600;
            color: white;
            text-shadow: 0 0 10px #ff69b4, 0 0 20px #ff69b4;
            line-height: 1.4;
            text-align: center;
        }

        .oval-text .small {
            font-size: 20px;
            display: block;
            margin-top: 8px;
            text-shadow: 0 0 8px #ff69b4;
        }

        /* ========== КОНТЕЙНЕР ДЛЯ КВАДРАТОВ ========== */
        .squares-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin: 20px 0;
            width: 100%;
        }

        /* ========== RGB КВАДРАТЫ ========== */
        .rgb-square {
            width: 500px;
            height: 500px;
            border: 4px solid white;
            border-radius: 30px;
            background: transparent;
            box-shadow: 
                0 0 20px #ff0000,
                0 0 40px #00ff00,
                0 0 60px #0000ff,
                0 0 80px #ff00ff;
            animation: rgbGlow 4s infinite alternate;
        }

        @keyframes rgbGlow {
            0% { box-shadow: 0 0 20px #ff0000, 0 0 40px #00ff00, 0 0 60px #0000ff; }
            25% { box-shadow: 0 0 20px #ff00ff, 0 0 40px #00ffff, 0 0 60px #ffff00; }
            50% { box-shadow: 0 0 20px #00ffff, 0 0 40px #ff00ff, 0 0 60px #ff0000; }
            75% { box-shadow: 0 0 20px #ffff00, 0 0 40px #ff0000, 0 0 60px #00ff00; }
            100% { box-shadow: 0 0 20px #0000ff, 0 0 40px #ff00ff, 0 0 60px #00ffff; }
        }

        /* ========== АДАПТАЦИЯ ========== */
        @media (max-width: 600px) {
            .profile-header {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }
            
            .info-stats-wrapper {
                flex-direction: column;
                align-items: center;
                width: 100%;
            }
            
            .user-info h1 {
                font-size: 32px;
                white-space: normal;
            }
            
            .user-info h2 {
                white-space: normal;
            }
            
            .stats-row {
                width: fit-content;
                justify-content: center;
                margin: 0 auto;
            }
            
            .avatar-circle {
                width: 80px;
                height: 80px;
            }
            
            .greeting-text {
                font-size: 20px;
            }
            
            .greeting-text .highlight {
                font-size: 24px;
            }
            
            .oval-text {
                font-size: 22px;
            }
            
            .rgb-square {
                width: 400px;
                height: 400px;
            }
        }

        @media (max-width: 450px) {
            .rgb-square {
                width: 300px;
                height: 300px;
            }
            
            .stats-row {
                gap: 15px;
                padding: 10px 15px;
            }
            
            .stat-item {
                min-width: 60px;
            }
            
            .stat-value {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ========== КАРТОЧКА ПРОФИЛЯ ========== -->
        <div class="profile-card">
            <div class="profile-header">
                <!-- АВАТАРКА -->
                <div class="avatar-circle">
                    <img src="avatar.jpg" alt="Liza6666">
                </div>
                <div class="info-stats-wrapper">
                    <div class="user-info">
                        <h1>Liza6666</h1>
                        <h2>Pro Trader • Looking for trades</h2>
                    </div>
                    <div class="stats-row">
                        <div class="stat-item">
                            <div class="stat-value">2.5K</div>
                            <div class="stat-label">FOLLOW</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">168</div>
                            <div class="stat-label">ОБМЕНОВ</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ========== ПРИВЕТСТВИЕ ========== -->
            <div class="greeting-box">
                <div class="greeting-text">
                    <span class="red">🔴 Привет! 🔴</span><br>
                    это мой трейд аккаунт в<br>
                    <span class="highlight">Adopt Me!</span><br>
                    <span class="small">Добавляйся в друзья для обмена 🎁</span>
                </div>
            </div>

            <!-- ========== РАЗДЕЛИТЕЛЬ ========== -->
            <div class="divider"></div>

            <!-- ========== МЕСТО ДЛЯ ПИТОМЦЕВ ========== -->
            <div class="content-area">
                <!-- СЮДА БУДЕШЬ ДОБАВЛЯТЬ КАРТОЧКИ ПИТОМЦЕВ -->
            </div>
        </div>

        <!-- ========== ОВАЛ С ТЕКСТОМ ========== -->
        <div class="oval-box">
            <div class="oval-text">
                Вот какие трейды<br>
                я могу тебе<br>
                предложить<br>
                <span class="small">🎁 выбирай 🎁</span>
            </div>
        </div>

        <!-- ========== КОНТЕЙНЕР С КВАДРАТАМИ ========== -->
        <div class="squares-container">
            <div class="rgb-square"></div>
            <div class="rgb-square"></div>
            <div class="rgb-square"></div>
            <div class="rgb-square"></div>
        </div>
    </div>
</body>
</html>
